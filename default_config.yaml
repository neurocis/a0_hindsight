# Hindsight plugin configuration defaults
#
# Settings are split into two categories:
#
# GLOBAL (shared across all projects):
#   - hindsight_base_url: Hindsight server URL
#   - hindsight_bank_prefix: Prefix combined with project name for bank isolation
#   These are always read from the global (no-project) scope.
#
# PER-PROJECT (can vary per project via the project selector):
#   - hindsight_bank_id: Explicit bank ID override
#   - hindsight_retain_enabled: Store conversation memories after each interaction
#   - hindsight_recall_enabled: Enrich recall with semantic search
#   - hindsight_reflect_enabled: Inject disposition-aware context
#   - All other settings below
#   Use the "Default" project for fallback values that apply when a
#   project has no explicit override.

# ─── Global Settings ────────────────────────────────────────

# Hindsight Base URL - the server endpoint
# Also settable via HINDSIGHT_BASE_URL environment variable (takes priority)
hindsight_base_url: ""

# Bank ID prefix - combined with project name for isolation
hindsight_bank_prefix: "a0"

# ─── Per-Project Settings ───────────────────────────────────

# Explicit bank ID override (leave blank for auto-derivation: prefix-projectname)
hindsight_bank_id: ""

# Enable/disable individual Hindsight operations
hindsight_retain_enabled: true
hindsight_recall_enabled: true
hindsight_reflect_enabled: true

# Recall settings
hindsight_recall_max_tokens: 4096
hindsight_recall_budget: "mid"

# Reflect settings
hindsight_reflect_budget: "low"
hindsight_reflect_max_tokens: 500

# Cache TTL for reflect context (seconds)
hindsight_cache_ttl: 120

# Debug logging
hindsight_debug: false
